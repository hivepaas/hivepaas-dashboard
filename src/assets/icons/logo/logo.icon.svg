        <!-- Column 2 (Height 2) -->
        <rect x="11.75" y="16.5" width="3.5" height="3.5" rx="0.8" ry="0.8" fill="#f5f5f7" />
        <rect x="11.75" y="21" width="3.5" height="3.5" rx="0.8" ry="0.8" fill="#f5f5f7" />

        <!-- Column 3 (Height 2) -->
        <rect x="16.25" y="16.5" width="3.5" height="3.5" rx="0.8" ry="0.8" fill="#f5f5f7" />
        <rect x="16.25" y="21" width="3.5" height="3.5" rx="0.8" ry="0.8" fill="#f5f5f7" />

        <!-- Column 4 (Height 3) -->
        <rect x="20.75" y="12" width="3.5" height="3.5" rx="0.8" ry="0.8" fill="#f5f5f7" />
        <rect x="20.75" y="16.5" width="3.5" height="3.5" rx="0.8" ry="0.8" fill="#f5f5f7" />
        <rect x="20.75" y="21" width="3.5" height="3.5" rx="0.8" ry="0.8" fill="#f5f5f7" />

